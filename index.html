<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dixit's Spotify</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./scss/main.css">
    <link
      href="https://fonts.fontshare.com/css?f[]=satoshi&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header></header>
     <main> 
       <input type="radio" name="main-nav" id="tab-1" checked />
      <input type="radio" name="main-nav" id="tab-2" />
      <input type="radio" name="main-nav" id="tab-3" />
      <input type="radio" name="main-nav" id="tab-4" />
      <input type="radio" name="main-nav" id="tab-5" />
      <section id="home" class="home">
         <nav class="home-nav">
               <ul>
                   <li >
                      <button >Music</button>
                    </li>
                    <li>
                       <button >Podcasts</button>
                     </li>
                     <li class="filter-list__item">
                          <button class="filter-btn">Audiobooks</button>
                     </li>
            
                  </ul>
             <div class="home-nav__icons">
                <button class="icon-btn" aria-label="Settings">
                    <img src="./assets/icons/queue.svg" alt="settings" class="icon-ui">
                </button>
             </div>
         </nav> 
         <section class="recent-played">
             <article>
                <img src="./assets/covers/thumbs/Rectangle 6 (1).svg" alt="get-lucky">
                <div class="recent-played__info">
                <h2>Get Lucky (feat. Pharrell Williams and Nile Rodgers)</h2>
                <p>Daft Punk</p>
                </div>
             </article>
             <article>
                <img src="./assets/covers/thumbs/image 8.svg" alt="DailyMix2">
                <div class="recent-played__info">
                <h2>Daily Mix 2</h2>
                </div>
             </article>
             <article>
                 <img src="./assets/covers/thumbs/image 6.svg" alt="get-lucky">
                <div class="recent-played__info">
                <h2>Daily Mix 1</h2>
                </div>
             </article>
             <article>
                 <img src="./assets/covers/thumbs/Rectangle 6 (1).svg" alt="get-lucky">
                <div class="recent-played__info">
                <h2>Instant Crush</h2>
                <p>Daft Punk</p>
                </div>
             </article>
             <article>
               <img src="./assets/covers/thumbs/Rectangle 6 (1).svg" alt="get-lucky">
                <div class="recent-played__info">
                <h2>Around the world</h2>
                <p>Daft Punk</p>
                </div>
             </article>
             <article>
                  <img src="./assets/covers/thumbs/image 2 (1).svg" alt="get-lucky">
                  <div class="recent-played__info">
                  <h2>Rock Mix</h2>
                  </div>
             </article>
        </section>
      </section>
      <section id="discover" class="discover"></section>
      <section id="search" class="search"></section>
      <section id="library" class="library"></section>
      <section id="profile" class="profile"></section>
    </main>
    <footer>
      <!-- <nav>
        <label for="tab-1">Home</label>
        <label for="tab-2">Discover</label>
        <label for="tab-3">Search</label>
        <label for="tab-4">Library</label>
        <label for="tab-5">Me</label>
      </nav> -->
    </footer>
  </body>
</html>
